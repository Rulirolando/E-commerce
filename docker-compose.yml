version: "3.8"

services:
  app:
    build: .
    image: my-commerce
    ports:
      - "3000:3000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ngrok:
    image: ngrok/ngrok:latest
    command:
      - "http"
      - "app:3000"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTH}
    ports:
      - "4040:4040"
    depends_on:
      - app
